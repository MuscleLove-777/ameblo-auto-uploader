name: Ameba Blog Auto Post

on:
  schedule:
    # 1日3回投稿: 8:00 JST, 12:00 JST, 20:00 JST
    - cron: '0 23 * * *'   # 8:00 JST (23:00 UTC前日)
    - cron: '0 3 * * *'    # 12:00 JST (03:00 UTC)
    - cron: '0 11 * * *'   # 20:00 JST (11:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest

    env:
      GDRIVE_FOLDER_ID_AMEBLO: ${{ secrets.GDRIVE_FOLDER_ID_AMEBLO }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@latest
        with:
          chrome-version: stable

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Decode Ameblo cookies
        run: echo "$AMEBLO_COOKIES" | base64 -d > ameblo_cookies.json
        env:
          AMEBLO_COOKIES: ${{ secrets.AMEBLO_COOKIES }}

      - name: Run upload script
        run: |
          python upload.py \
            --headless \
            --no-sandbox \
            --disable-dev-shm-usage

      - name: Commit upload log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add uploaded_ameblo.json
          git diff --cached --quiet || git commit -m "Update uploaded_ameblo.json [skip ci]"
          git push
