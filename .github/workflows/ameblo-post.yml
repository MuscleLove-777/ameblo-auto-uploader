name: Ameba Blog Auto Post

on:
  schedule:
    # 毎日 JST 12:00 (UTC 3:00)
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest

    env:
      GDRIVE_FOLDER_ID_AMEBLO: ${{ secrets.GDRIVE_FOLDER_ID_AMEBLO }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      AMEBLO_USERNAME: ${{ secrets.AMEBLO_USERNAME }}
      AMEBLO_PASSWORD: ${{ secrets.AMEBLO_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@latest
        with:
          chrome-version: stable

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Decode Ameblo cookies
        run: echo "$AMEBLO_COOKIES" | base64 -d > ameblo_cookies.json
        env:
          AMEBLO_COOKIES: ${{ secrets.AMEBLO_COOKIES }}

      - name: Run upload script (attempt 1)
        id: attempt1
        continue-on-error: true
        run: |
          python upload.py \
            --headless \
            --no-sandbox \
            --disable-dev-shm-usage

      - name: Wait before retry
        if: steps.attempt1.outcome == 'failure'
        run: echo "1回目失敗。60秒待ってリトライ..." && sleep 60

      - name: Run upload script (attempt 2)
        id: attempt2
        if: steps.attempt1.outcome == 'failure'
        continue-on-error: true
        run: |
          python upload.py \
            --headless \
            --no-sandbox \
            --disable-dev-shm-usage

      - name: Wait before retry 2
        if: steps.attempt1.outcome == 'failure' && steps.attempt2.outcome == 'failure'
        run: echo "2回目失敗。120秒待ってリトライ..." && sleep 120

      - name: Run upload script (attempt 3 - final)
        id: attempt3
        if: steps.attempt1.outcome == 'failure' && steps.attempt2.outcome == 'failure'
        run: |
          python upload.py \
            --headless \
            --no-sandbox \
            --disable-dev-shm-usage

      - name: Commit upload log
        if: steps.attempt1.outcome == 'success' || steps.attempt2.outcome == 'success' || steps.attempt3.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add uploaded_ameblo.json
          git diff --cached --quiet || git commit -m "Update uploaded_ameblo.json [skip ci]"
          git pull --rebase origin master
          git push

      - name: LINE notify on failure
        if: steps.attempt1.outcome == 'failure' && (steps.attempt2.outcome == 'failure' || steps.attempt2.outcome == 'skipped') && (steps.attempt3.outcome == 'failure' || steps.attempt3.outcome == 'skipped')
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          curl -s -X POST https://api.line.me/v2/bot/message/push \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${LINE_CHANNEL_TOKEN}" \
            -d "{
              \"to\": \"${LINE_USER_ID}\",
              \"messages\": [{
                \"type\": \"text\",
                \"text\": \"⚠️ Ameblo自動投稿が3回リトライしても失敗しました\n\n時刻: $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')\nリポジトリ: ${{ github.repository }}\nログ: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
              }]
            }"

      - name: LINE notify on success
        if: steps.attempt1.outcome == 'success' || steps.attempt2.outcome == 'success' || steps.attempt3.outcome == 'success'
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          RETRY_INFO=""
          if [ "${{ steps.attempt2.outcome }}" = "success" ]; then
            RETRY_INFO="（2回目で成功）"
          elif [ "${{ steps.attempt3.outcome }}" = "success" ]; then
            RETRY_INFO="（3回目で成功）"
          fi
          curl -s -X POST https://api.line.me/v2/bot/message/push \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${LINE_CHANNEL_TOKEN}" \
            -d "{
              \"to\": \"${LINE_USER_ID}\",
              \"messages\": [{
                \"type\": \"text\",
                \"text\": \"✅ Ameblo自動投稿 成功${RETRY_INFO}\n時刻: $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')\"
              }]
            }"
